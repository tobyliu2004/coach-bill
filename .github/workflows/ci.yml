# CI — quality gates for every PR and every push to main.
#
# Design (researched, July 2026): NO workflow-level `paths:` filter — a required check
# that never triggers leaves PRs blocked forever ("Pending"). Instead the workflow always
# runs, a `changes` job detects what actually changed, the heavy jobs run conditionally,
# and a single always-running `ci-ok` gate job summarizes. Only `ci-ok` is marked as a
# required status check in the branch ruleset.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref. Matters now that rls-tests pulls and boots real Docker
# images: without this, pushing twice in a minute leaves two Postgres stacks booting in parallel.
# PRs only — a push to main must always finish, since main's runs record the state of the branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            # The database surface. Kept SEPARATE from `backend` on purpose: the RLS behavior
            # under test lives in these files (policies, grants, seed.sql), so a schema-only PR
            # must still run the RLS proofs — but it has no Python for ruff/mypy/unit to check.
            # Folding these into `backend` would also silently mis-trigger any FUTURE job gated
            # on `backend` for PRs that touch no backend code at all.
            schema:
              - 'supabase/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv (reads backend/.python-version and uv.lock via the run dir)
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies (locked)
        run: uv sync --locked
      - name: Lint (ruff)
        run: uv run ruff check
      - name: Type-check (mypy strict)
        run: uv run mypy app
      - name: Tests (unit; real-DB integration test auto-skips without DATABASE_URL)
        run: uv run pytest -q

  # The RLS proofs (backend/tests/test_rls_identity.py) skip unless RLS_DATABASE_URL is set.
  # This job boots a real Postgres via the Supabase CLI so they actually execute and gate merges.
  # It needs the Supabase platform scaffolding (auth schema/table, auth.uid(), authenticated role)
  # that a bare postgres image lacks; `supabase start` applies migrations + seed.sql (which creates
  # the non-BYPASSRLS coach_app role the code under test connects as).
  #
  # Runs on `backend` OR `schema`: the code under test is in backend/, but the RLS policies and
  # grants it proves live in supabase/ — a schema-only PR is exactly the case that must not slip
  # through green (that is the whole point of issue #31).
  rls-tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    # Everything else here finishes in seconds; this job pulls and boots real Docker images, so
    # it is the only one that can hang. Fail it loudly instead of burning the 6h default.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned, not `latest`: this job is a REQUIRED gate, so an upstream CLI release must
          # never be able to change what it does (or break it) with no diff on our side.
          # 2.109.1 is the version the job was first proven green on. Bump deliberately.
          version: 2.109.1
      - name: Boot local Postgres (applies migrations + seed.sql, creates coach_app)
        working-directory: .            # supabase/ lives at repo root, not backend/
        run: supabase start
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies (locked)
        run: uv sync --locked
      - name: Run the full suite WITH a real DB (gated tests now execute)
        env:
          # Non-BYPASSRLS app role from supabase/seed.sql — the code under test uses this.
          RLS_DATABASE_URL: postgresql://coach_app:coach_app_dev_pw@127.0.0.1:54322/postgres
          # Privileged conn used ONLY by fixtures to seed auth.users / exercises.
          RLS_ADMIN_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          # Presence of DATABASE_URL flips HAS_REAL_DB in conftest.py, so the OTHER gated
          # integration tests (test_check_ins, test_health) also run. Point at the admin conn
          # to reproduce the documented local `uv run --env-file .env pytest` semantics.
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
          SUPABASE_URL: https://test.supabase.co
        run: uv run pytest -q

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (locked)
        run: npm ci
      - name: Type-check + build (tsc -b && vite build)
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test

  # The single required check. Green only when everything that needed to run succeeded.
  ci-ok:
    needs: [changes, backend, frontend, rls-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all results are success or skipped
        run: |
          results="${{ needs.changes.result }} ${{ needs.backend.result }} ${{ needs.frontend.result }} ${{ needs.rls-tests.result }}"
          echo "job results: $results"
          for r in $results; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required job finished with result '$r'"; exit 1 ;;
            esac
          done
          # `changes` itself must actually succeed (a skipped detector means nothing ran validly)
          [ "${{ needs.changes.result }}" = "success" ] || { echo "::error::changes job did not succeed"; exit 1; }
