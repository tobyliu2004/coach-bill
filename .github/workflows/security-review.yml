# Security review — runs on every PR, whether or not anyone remembered to run /security-review.
#
# Why this exists as CI and not just a checklist item: the backend connects to Postgres as a role
# with BYPASSRLS. The RLS policies in the schema do nothing on the server path, so `and user_id =
# $2` in the query itself is the entire thing separating one user's data from another's. A single
# missing filter is a cross-user data leak, and it looks completely fine in review.
#
# CLAUDE.md and .claude/rules/ are advisory — they only work if the model reads and follows them.
# This runs on the diff regardless.
#
# What it does and does NOT do — read this before trusting it:
#  - It comments findings on the PR, and the `gate` step below turns the job RED when there are
#    any. Red here is a STOP-AND-READ signal.
#  - It does NOT block the merge today. Only `ci-ok` is a required check on `main`. To make this
#    one blocking, add "Security review / security" to the branch ruleset's required checks.
#    (Deliberately Toby's call, not Claude's — a scanner with false positives becomes a red check
#    people learn to click past, which is worse than no check.)
#  - The upstream action swallows its own audit exit code into a `::warning::`, so WITHOUT the
#    `gate` step below a high-severity data-leak finding produces a green check. That is why the
#    step exists. Don't delete it.
#
# Requires an ANTHROPIC_API_KEY repo secret. Without it the action's own precheck exits 1, so the
# job fails loudly rather than passing silently — the correct behaviour for a security gate.

name: Security review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - id: scan
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: true
          # Re-scan on every push, not just the first. The action defaults this to false and
          # caches a marker per PR — which would mean the review-and-fix pushes (i.e. exactly the
          # security-relevant ones) are never scanned, and the code that merges is not the code
          # that was checked.
          run-every-commit: true
          # MUST be an absolute workspace path. The action does `cd "$ACTION_PATH"` before running
          # the audit, and the script resolves this with a bare `Path(scan_file).exists()` — so a
          # relative path resolves against the action's own checkout, misses, and is skipped
          # SILENTLY. The generic scanner would then never learn the one thing it most needs to
          # know here (that our DB role bypasses RLS).
          custom-security-scan-instructions: ${{ github.workspace }}/.github/security-scan-instructions.md

      - name: Gate — findings fail the job
        if: always() && steps.scan.outputs.findings-count != '0' && steps.scan.outputs.findings-count != ''
        run: |
          echo "::error::Security review reported ${{ steps.scan.outputs.findings-count }} finding(s). Read the PR comment."
          exit 1
